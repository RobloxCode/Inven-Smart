<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inven-Smart — Acceso</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0d1b2e;
      --surface: #132035;
      --surface2: #1a2d47;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --text: #e8f0fe;
      --text2: #94afd4;
      --border: rgba(59, 130, 246, 0.18);
      --radius: 20px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --transition: 0.3s cubic-bezier(.4, 0, .2, 1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.15), transparent 40%),
        radial-gradient(circle at bottom left, rgba(30, 64, 175, 0.15), transparent 40%);
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      backdrop-filter: blur(10px);
      animation: slideUp 0.5s ease-out forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      padding: 32px 24px 20px;
      text-align: center;
    }

    .login-logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), #1e40af);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 0 24px rgba(59, 130, 246, 0.4);
    }

    .login-logo svg {
      width: 32px;
      height: 32px;
      color: #fff;
    }

    .login-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .login-subtitle {
      font-size: 14px;
      color: var(--text2);
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin: 0 24px 20px;
      position: relative;
    }

    .tab {
      flex: 1;
      padding: 12px 0;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--text2);
      cursor: pointer;
      transition: color var(--transition);
    }

    .tab.active {
      color: var(--accent);
    }

    .tab-indicator {
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 50%;
      height: 2px;
      background: var(--accent);
      transition: transform var(--transition);
    }

    .forms-container {
      position: relative;
      height: 280px;
      overflow: hidden;
    }

    .form-slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 0 24px 32px;
      transition: transform var(--transition), opacity var(--transition);
    }

    .form-slide.inactive {
      opacity: 0;
      pointer-events: none;
    }

    #form-admin {
      transform: translateX(100%);
    }

    .input-group {
      margin-bottom: 16px;
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text2);
      width: 20px;
      height: 20px;
    }

    .login-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 14px 14px 44px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: all var(--transition);
    }

    .login-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    .login-input::placeholder {
      color: rgba(148, 175, 212, 0.5);
    }

    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
      box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
    }

    .btn-submit:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
    }

    .btn-submit:active {
      transform: translateY(1px);
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z" />
          <path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2" />
        </svg>
      </div>
      <h1 class="login-title">Inven-Smart</h1>
      <p class="login-subtitle">Gestión inteligente de almacén</p>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('empleado')">Empleado</div>
      <div class="tab" onclick="switchTab('admin')">Administrador</div>
      <div class="tab-indicator" id="indicator"></div>
    </div>

    <div class="forms-container">
      <!-- Formulario Empleado -->
      <div class="form-slide" id="form-empleado">
        <form onsubmit="handleLogin(event, 'empleado')">
          <div class="input-group">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <input type="text" class="login-input" placeholder="Matrícula de Empleado" required>
          </div>
          <div class="input-group">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0110 0v4" />
            </svg>
            <input type="password" class="login-input" placeholder="Contraseña" required>
          </div>
          <button type="submit" class="btn-submit">
            Ingresar al Panel
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="5" y1="12" x2="19" y2="12" />
              <polyline points="12 5 19 12 12 19" />
            </svg>
          </button>
        </form>
      </div>

      <!-- Formulario Administrador -->
      <div class="form-slide inactive" id="form-admin">
        <form onsubmit="handleLogin(event, 'admin')">
          <div class="input-group">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2l9 4.9V11c0 5.5-3.8 10.7-9 12-5.2-1.3-9-6.5-9-12V6.9L12 2z" />
            </svg>
            <input type="text" class="login-input" placeholder="ID de Administrador" required>
          </div>
          <div class="input-group">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0110 0v4" />
            </svg>
            <input type="password" class="login-input" placeholder="Clave de Acceso" required>
          </div>
          <button type="submit" class="btn-submit"
            style="background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 4px 14px rgba(245,158,11,0.3);">
            Acceso Administrativo
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="5" y1="12" x2="19" y2="12" />
              <polyline points="12 5 19 12 12 19" />
            </svg>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script>
    function switchTab(type) {
      const tabs = document.querySelectorAll('.tab');
      const indicator = document.getElementById('indicator');
      const formEmpleado = document.getElementById('form-empleado');
      const formAdmin = document.getElementById('form-admin');

      if (type === 'empleado') {
        tabs[0].classList.add('active');
        tabs[1].classList.remove('active');
        indicator.style.transform = 'translateX(0)';

        formEmpleado.classList.remove('inactive');
        formEmpleado.style.transform = 'translateX(0)';

        formAdmin.classList.add('inactive');
        formAdmin.style.transform = 'translateX(100%)';
      } else {
        tabs[0].classList.remove('active');
        tabs[1].classList.add('active');
        indicator.style.transform = 'translateX(100%)';

        formAdmin.classList.remove('inactive');
        formAdmin.style.transform = 'translateX(0)';

        formEmpleado.classList.add('inactive');
        formEmpleado.style.transform = 'translateX(-100%)';
      }
    }

    function handleLogin(event, role) {
      event.preventDefault(); // Evitar comportamiento por defecto

      const btn = event.target.querySelector('button');
      const originalContent = btn.innerHTML;

      // Indicador de carga
      btn.innerHTML = '<svg viewBox="0 0 50 50" style="width:20px;height:20px;animation:spin 1s linear infinite"><circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="4" stroke-dasharray="90 150" stroke-linecap="round"></circle></svg>';
      btn.style.pointerEvents = 'none';

      // Simular un tiempo de carga y luego redirigir
      setTimeout(() => {
        if (role === 'empleado') {
          window.location.href = 'index.html';
        } else {
          window.location.href = 'admin.html';
        }
      }, 800);
    }
  </script>
</body>

</html>
